# Turing 编程智能体配置（v3.0）
model:
  name: "qwen3-coder:30b"
  temperature: 0.3
  # 反思/规划阶段的温度
  reflect_temperature: 0.6
  # 最大迭代轮次
  max_iterations: 50
  # 模型上下文窗口大小（token，用于 Token-aware 上下文管理）
  context_length: 32768
  # 是否启用流式输出
  stream_output: true

# 多 Provider LLM 路由配置（v2.0）
# 支持本地 Ollama + 云端 API 协同，按任务复杂度自动路由。
# 设置 API Key 即可启用对应 provider（也可通过环境变量注入）。
#
# llm:
#   default: ollama
#   providers:
#     ollama:
#       type: ollama
#       model: qwen3-coder:30b
#       context_length: 32768
#     openai:
#       type: openai
#       model: gpt-4o
#       api_key: "sk-..."               # 或设定 OPENAI_API_KEY 环境变量
#       context_length: 128000
#     anthropic:
#       type: anthropic
#       model: claude-sonnet-4-20250514
#       api_key: "sk-ant-..."           # 或设定 ANTHROPIC_API_KEY 环境变量
#       context_length: 200000
#     deepseek:
#       type: deepseek
#       model: deepseek-chat
#       api_key: "sk-..."               # 或设定 DEEPSEEK_API_KEY 环境变量
#       context_length: 128000
#   routing:
#     simple: ollama                     # 简单任务 → 本地快速模型
#     medium: ollama                     # 中等任务 → 本地模型
#     complex: anthropic                 # 复杂任务 → 最强云端模型
#   fallback_chain: [anthropic, openai, ollama]

memory:
  data_dir: "turing_data"
  working:
    # 工作记忆占上下文窗口的最大比例
    max_context_ratio: 0.3
    # 压缩时保留最近的条目数
    keep_recent: 5
  long_term:
    # ChromaDB 集合名
    collection: "turing_long_term"
    # 默认检索条数
    default_top_k: 5
    # 衰减因子（未使用的记忆逐步降权）
    decay_factor: 0.95
  persistent:
    # 持久记忆目录
    dir: "persistent_memory"

evolution:
  # 触发策略进化的最小同类经验数
  strategy_threshold: 5
  # 触发知识蒸馏的任务间隔
  distill_interval: 50

output:
  # 生成代码的输出目录
  generated_code_dir: "generated_code"

security:
  # 危险操作确认模式: interactive（交互确认）/ callback（回调函数）/ auto（自动批准）
  confirmation_mode: "interactive"
  # 是否自动批准所有确认请求（仅限测试环境）
  auto_approve: false
  # 沙箱执行模式: host（直接执行）/ docker（Docker 容器隔离）
  sandbox_mode: "host"
  # Docker 沙箱镜像
  docker_image: "python:3.11-slim"
  # 禁止执行的命令模式
  blocked_commands:
    - "rm -rf /"
    - "rm -rf ~"
    - "mkfs"
    - "dd if="
    - ":(){:|:&};:"
    - "DROP TABLE"
    - "DROP DATABASE"
  # 禁止访问的路径
  blocked_paths:
    - "/etc/shadow"
    - "/etc/passwd"
  # 允许操作的工作目录（为空则使用当前目录）
  workspace_root: ""

# MCP 协议集成（v2.1）
# 通过 Model Context Protocol 连接外部工具服务器，扩展 Turing 的工具能力。
# 支持 stdio（子进程）和 SSE（HTTP）两种传输方式。
